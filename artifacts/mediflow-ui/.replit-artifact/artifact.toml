kind = "web"
previewPath = "/mediflow-ui/"
title = "MediFlow - Confidential Health Records"
version = "1.0.0"
id = "artifacts/mediflow-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/mediflow-ui/" ]
localPort = 19798

[services.development]
run = "pnpm --filter @workspace/mediflow-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mediflow-ui", "run", "build" ]
publicDir = "artifacts/mediflow-ui/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19798"
BASE_PATH = "/mediflow-ui/"
